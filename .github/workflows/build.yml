name: Build and Push APK

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 22 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Clean old APKs
        run: |
          rm -f app/build/outputs/apk/debug/*.apk
          ls app/build/outputs/apk/debug/ || true

      - name: Build APK
        run: |
          ./gradlew assembleDebug --no-daemon

      - name: Push APK to repository
        uses: EndBug/add-and-commit@v9
        with:
          default_author: github_actions
          message: "chore: add debug APK"
          add: |
            app/build/outputs/apk/debug/app-debug.apk
          push: origin main
